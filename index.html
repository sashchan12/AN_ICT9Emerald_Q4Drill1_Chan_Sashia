<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Q4 Drill 1</title>

    <style>
        body {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            background-image: url("bg.png");
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 50px;
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.9);
            max-width: 450px;
            font-size: 3.5rem;
            margin: 0;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            text-align: center;
            width: 380px;
        }

        .logo {
            width: 100px;
            margin-bottom: 15px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }

        button {
            background-color: #ff5e00;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }

        .results {
            margin-top: 20px;
            text-align: left;
            min-height: 60px;
            border-top: 1px solid #ddd;
            padding-top: 15px;
        }

        #error {
            color: #d93025;
            font-weight: bold;
            margin: 0;
        }

        #ctg, #dc {
            margin: 5px 0;
        }
    </style>
</head>

<body>

    <h1>Electricity Consumption Classifier</h1>

    <div class="container">
        <img src="logo.png" alt="Logo" class="logo">
        
        <div class="input">
            <input type="number" id="amt" placeholder="Enter kWh usage">
            <br><br>

            <button onclick="consumption()">Consumption Classification</button>

            <div class="results">
                <p id="error"></p> 
                <p id="ctg"></p>
                <p id="dc"></p>
            </div>
        </div>
    </div>

    <script>
        function consumption() {
            let kWh = parseFloat(document.getElementById('amt').value);
            let ctgry = "";
            let desc = "";

            document.getElementById('error').textContent = "";
            document.getElementById('ctg').textContent = "";
            document.getElementById('dc').textContent = "";

            if (isNaN(kWh) || kWh < 0) {
                document.getElementById('error').textContent = "Error! Kindly input your Electricity Consumption.";
                return;
            }

            if (kWh <= 100) {
                ctgry = "Lifeline Consumer";
                desc = "Discounted electricity rates";
            } else if (kWh <= 200) {
                ctgry = "Low Consumption";
                desc = "Normal residential rate";
            } else if (kWh <= 300) {
                ctgry = "Average Consumption";
                desc = "Typical electricity usage";
            } else if (kWh <= 500) {
                ctgry = "High Consumption";
                desc = "Higher electricity usage";
            } else {
                ctgry = "Very High Consumption";
                desc = "Heavy electricity users";
            }

            document.getElementById('ctg').textContent = "Category: " + ctgry;
            document.getElementById('dc').textContent = "Description: " + desc;
        }
    </script>

</body>

</html>
